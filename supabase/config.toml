project_id = "sunday-bets"

[db.seed]
enabled = true

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/auth/callback",
  "http://localhost:5173/auth/confirm",
  "https://nfl-bets.vercel.app/auth/callback",
  "https://nfl-bets-git-*.vercel.app/auth/callback"
]
email.template.magic_link.content_path = "./supabase/magic_link.html"

[api]
max_rows = 10000

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"

[storage]
enabled = false