# .github/workflows/cron-send-reminders.yml
name: "Cron: Send Pick Reminders"

on:
  schedule:
    # Thursday ~15:00 UTC — nudge unpicked games kicking off within 48h.
    - cron: "0 15 * * 4"
  workflow_dispatch:

jobs:
  send_reminders_production:
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v6
      - name: Call send-reminders endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ vars.DEPLOY_URL }}/api/cron/send-reminders")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cron job failed with HTTP $http_code"
            exit 1
          fi
