# .github/workflows/migrate-db.yml
name: Supabase Migrations

on:
  push:
    branches: [master]
    paths:
      - 'supabase/**'
      - '.github/workflows/migrate-db.yml'

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

env:
  SUPABASE_CLI_VERSION: 2.107.0

jobs:
  source_integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migration:check

  backup:
    needs: [source_integrity]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v7
      - name: Install tools (pg_dump 17, rclone)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor | sudo tee /usr/share/keyrings/pgdg.gpg >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Backup DB to OneDrive (rclone)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          FILE="supabase_${TS}_${GITHUB_SHA::7}.dump"
          /usr/lib/postgresql/17/bin/pg_dump --dbname="$SUPABASE_DB_URL" \
            --format=custom --no-owner --no-privileges --compress=9 --file="$FILE"
          rclone copy "$FILE" onedrive:supabase-backups/

  migrate_master:
    needs: [backup]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v7
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
      - name: Run Supabase migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes
