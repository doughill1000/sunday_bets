# .github/workflows/migrate-db.yml
name: Supabase Migrations

on:
  push:
    branches: [ master, develop ]

jobs:
  supabase-migrate:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref == 'master' && 'Production' || 'Development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
          | sudo tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Migrate
        env:
          # The secret is automatically selected from the job's environment
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo ${{ github.base_ref}}
          echo "Running migrations against ${{ github.base_ref == 'master' && 'Production' || 'Development' }} environment..."
          supabase db push --db-url "$SUPABASE_DB_URL" --yes
