# .github/workflows/migrate.yml
name: Apply Supabase DB migrations

on:
  push:
    branches:
      - master
      - develop

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Set the environment based on the branch
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
          | sudo tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Apply migrations
        env:
          # The secret is automatically selected from the job's environment
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Applying migrations to ${{ job.environment }} environment..."
          supabase db push --db-url "$SUPABASE_DB_URL" --workdir ./app --yes
