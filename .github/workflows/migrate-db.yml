# .github/workflows/migrate-db.yml
name: Supabase Migrations (OneDrive backup)

on:
  push:
    branches: [ master, develop ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'master' && 'Production' || 'Development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools (Supabase CLI, pg_dump 17, rclone)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor | sudo tee /usr/share/keyrings/pgdg.gpg >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 rclone
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin supabase
          /usr/lib/postgresql/17/bin/pg_dump --version

      # -------- BACKUP (master only) --------
      - name: Backup DB to OneDrive (rclone)
        if: ${{ github.ref_name == 'master' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}    
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          # hydrate rclone config
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          FILE="supabase_${TS}_${GITHUB_SHA::7}.dump"

          # create compressed dump
          /usr/lib/postgresql/17/bin/pg_dump --dbname="$SUPABASE_DB_URL" \
            --format=custom --no-owner --no-privileges --compress=9 --file="$FILE"

          # upload to OneDrive folder "supabase-backups/"
          rclone copy "$FILE" onedrive:supabase-backups/

      # -------- MIGRATIONS --------
      - name: Run Supabase migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Migrating against ${{ github.ref_name == 'master' && 'Production' || 'Development' }}..."
          supabase db push --db-url "$SUPABASE_DB_URL" --yes