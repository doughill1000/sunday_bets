# .github/workflows/migrate-db.yml
name: Supabase Migrations

on:
  push:
    branches: [ master, develop ]

jobs:
  supabase-dry-run:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref == 'master' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
          | sudo tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Dry run migrations
        env:
          # The secret is automatically selected from the job's environment
          SUPABASE_DB_URL:
        run: |
          echo "Dry running migrations against ${{ github.base_ref == 'master' && 'production' || 'development' }} environment..."
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}" --yes
