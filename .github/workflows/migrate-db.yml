# .github/workflows/migrate-db.yml
name: Supabase Migrations

on:
  push:
    branches: [master, develop]
    paths:
      - 'supabase/**'
      - '.github/workflows/migrate-db.yml'

jobs:
  backup:
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v4
      - name: Install tools (pg_dump 17, rclone)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor | sudo tee /usr/share/keyrings/pgdg.gpg >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Backup DB to OneDrive (rclone)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
          TS=$(date -u +'%Y%m%dT%H%M%SZ')
          FILE="supabase_${TS}_${GITHUB_SHA::7}.dump"
          /usr/lib/postgresql/17/bin/pg_dump --dbname="$SUPABASE_DB_URL" \
            --format=custom --no-owner --no-privileges --compress=9 --file="$FILE"
          rclone copy "$FILE" onedrive:supabase-backups/

  migrate_master:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: [backup]
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin
          supabase --version
      - name: Run Supabase migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes

  migrate_develop:
    if: ${{ github.ref == 'refs/heads/develop' }}
    runs-on: ubuntu-latest
    environment:
      name: Development
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin
          supabase --version
      - name: Run Supabase migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes
