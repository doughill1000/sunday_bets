# .github/workflows/deploy-prod.yml
# Production deploys are gated: Vercel's automatic Git deploys are disabled
# (vercel.json `git.deploymentEnabled: false`), so this workflow is the only path
# to production. It deploys only when `package.json` "version" changes on a push to
# master, or on a manual `workflow_dispatch` (an off-cycle cut). See ADR-0010.
name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write # create the v<version> tag + GitHub Release on a version bump

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2 # need HEAD^ to compare the version line

      - name: Decide whether to deploy
        id: decide
        run: |
          NEW=$(node -p "require('./package.json').version")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Current version: $NEW"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — deploying current master."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git show HEAD^:package.json > /tmp/prev-package.json 2>/dev/null || echo '{}' > /tmp/prev-package.json
          OLD=$(node -p "require('/tmp/prev-package.json').version || ''")
          echo "Previous version: ${OLD:-<none>}"
          if [ "$NEW" != "$OLD" ]; then
            echo "Version bumped ($OLD -> $NEW) — deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version bump — skipping production deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      # `vercel build` spawns `pnpm` to install deps (project uses pnpm-lock.yaml).
      # Vercel's own infra provides pnpm; here the build runs in CI, so we must too.
      - uses: pnpm/action-setup@v6
        if: steps.decide.outputs.deploy == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v6
        if: steps.decide.outputs.deploy == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.decide.outputs.deploy == 'true'
        # Pin the major so a breaking CLI release can't silently break the only
        # path to production. Bump deliberately after vetting a new major.
        run: npm install -g vercel@54

      - name: Pull Vercel production environment
        if: steps.decide.outputs.deploy == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.decide.outputs.deploy == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        if: steps.decide.outputs.deploy == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      # On a real version bump (push, not manual dispatch), tag the release so the
      # milestone -> GitHub Release ritual stays in sync. Skips if the tag exists.
      - name: Tag release
        if: github.event_name == 'push' && steps.decide.outputs.deploy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.decide.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
