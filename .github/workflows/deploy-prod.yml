# .github/workflows/deploy-prod.yml
# Production releases are manual: Vercel's automatic Git deploys are disabled
# (vercel.json `git.deploymentEnabled: false`), and this workflow runs ONLY on a
# deliberate `workflow_dispatch` ("Run workflow"). A merge to master never ships to
# prod by itself.
#
# One dispatch is a full release, in order: verify migration source -> back up the
# prod DB -> apply pending migrations -> build & deploy the app -> tag the release.
# Migrations run before the deploy so the DB and app ship together. Migrations are
# validated at PR time by migrate-dry-run.yml (`supabase db push --dry-run`), so a
# bad migration is caught before it can reach this workflow. See ADR-0010.
name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false # never interrupt a release mid-flight

permissions:
  contents: write # create the v<version> tag + GitHub Release for the deployed version

env:
  SUPABASE_CLI_VERSION: 2.107.0

jobs:
  # 1. Migration ledger integrity must hold before we touch the prod DB.
  source_integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migration:check

  # 2. Back up prod before applying anything (runs on every release, even if there
  #    are no pending migrations — a pre-release snapshot is always worth having).
  backup:
    needs: [source_integrity]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v7
      # Pre-release snapshot via the shared composite action — identical dump/upload to
      # the scheduled cron-backup.yml. Retention pruning lives in that scheduled job.
      - uses: ./.github/actions/backup-supabase-db
        with:
          db-url: ${{ secrets.SUPABASE_DB_URL }}
          rclone-config-b64: ${{ secrets.RCLONE_CONFIG_B64 }}
          label: release

  # 3. Apply pending migrations to prod (idempotent no-op if none are pending).
  migrate:
    needs: [backup]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v7
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
      - name: Run Supabase migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes

  # 4. Build & deploy the app, then tag the release. Runs after the DB is migrated
  #    so app and schema ship together.
  deploy:
    needs: [migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      # `vercel build` spawns `pnpm` to install deps (project uses pnpm-lock.yaml).
      # Vercel's own infra provides pnpm; here the build runs in CI, so we must too.
      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        # Pin the major so a breaking CLI release can't silently break the only
        # path to production. Bump deliberately after vetting a new major.
        run: npm install -g vercel@54

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      # Tag the deployed version so the milestone -> GitHub Release ritual stays in
      # sync. Skips if the release/tag already exists (e.g. re-dispatching the same
      # version), so it's safe to run on every manual release.
      - name: Tag release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
