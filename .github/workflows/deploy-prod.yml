# .github/workflows/deploy-prod.yml
# Production deploys are manual: Vercel's automatic Git deploys are disabled
# (vercel.json `git.deploymentEnabled: false`), so this workflow is the only path
# to production, and it runs ONLY on a deliberate `workflow_dispatch` ("Run
# workflow"). A merge to master never ships to prod by itself. See ADR-0010.
name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write # create the v<version> tag + GitHub Release for the deployed version

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      # `vercel build` spawns `pnpm` to install deps (project uses pnpm-lock.yaml).
      # Vercel's own infra provides pnpm; here the build runs in CI, so we must too.
      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        # Pin the major so a breaking CLI release can't silently break the only
        # path to production. Bump deliberately after vetting a new major.
        run: npm install -g vercel@54

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      # Tag the deployed version so the milestone -> GitHub Release ritual stays in
      # sync. Skips if the release/tag already exists (e.g. re-dispatching the same
      # version), so it's safe to run on every manual release.
      - name: Tag release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
