# .github/workflows/cron-pregame.yml
name: 'Cron: Pregame (reminders + line moves)'

on:
  schedule:
    # Hourly. The endpoint self-gates: it only spends an Odds API call when a
    # game kicks off within the next few hours, so off-game hours are cheap.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  pregame_production:
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v6
      - name: Call pregame endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ vars.DEPLOY_URL }}/api/cron/pregame")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cron job failed with HTTP $http_code"
            exit 1
          fi
