name: PGTap Tests
on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            supabase:
              - 'supabase/**'
              - '.github/workflows/ci-pgtap.yml'

  pgTap:
    needs: detect-changes
    if: needs.detect-changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: 2.107.0
    steps:
      - uses: actions/checkout@v7
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
      - name: Supabase Start
        # Exclude services pgTAP doesn't need (matches ci-integration/playwright)
        # to cut startup time — only Postgres is required to run `supabase test db`.
        run: supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
      - name: Run Tests
        run: supabase test db

  pgTap-result:
    needs: pgTap
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          result="${{ needs.pgTap.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
