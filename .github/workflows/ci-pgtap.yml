name: PGTap Tests
on:
  pull_request:
    branches: [master]
    paths:
      - 'supabase/**'
      - '.github/workflows/ci-pgtap.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: 2.107.0
    steps:
      - uses: actions/checkout@v7
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
      - name: Supabase Start
        # Exclude services pgTAP doesn't need (matches ci-integration/playwright)
        # to cut startup time — only Postgres is required to run `supabase test db`.
        run: supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
      - name: Run Tests
        run: supabase test db
