name: PGTap Tests
on:
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: 2.107.0
    steps:
      - uses: actions/checkout@v6
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
      - name: Supabase Start
        run: supabase start
      - name: Run Tests
        run: supabase test db
