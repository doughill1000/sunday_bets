name: CI - pgTAP (DB tests)

on:
  pull_request:
    branches: [develop]
    paths:
      - 'supabase/**'
      - '.github/workflows/ci-pgtap.yml'

jobs:
  db-tests:
    runs-on: ubuntu-latest
    env:
      SUPABASE_CLI_VERSION: '2.40.7'
      # Default Supabase local connection
      PGHOST: 127.0.0.1
      PGPORT: "54322"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Cache Supabase CLI
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/supabase
          key: supabase-cli-${{ env.SUPABASE_CLI_VERSION }}

      - name: Install Supabase CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sL https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_linux_amd64.tar.gz \
          | tar -xz -C ~/.local/bin supabase
          ~/.local/bin/supabase --version
      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start local Supabase
        run: |
          supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
          # Recreate DB from migrations
          supabase db reset --local
          sleep 5

      # ---------- Install pg_prove on the RUNNER (client) ----------
      - name: Add PostgreSQL APT repo (PGDG) & install pgtap client
        run: |
          # Add PGDG repo so 'pgtap' package (pg_prove) is available
          echo "deb http://apt.postgresql.org/pub/repos/apt jammy-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          # 'pgtap' here provides pg_prove (no server files)
          sudo apt-get install -y pgtap postgresql-client

      # ---------- Install pgTAP *inside* the Supabase Postgres container ----------
      - name: Install pgTAP server extension inside DB container
        run: |
          # Find the db container (works for supabase-db or supabase_db)
          DB_CID=$(docker ps -q --filter "name=supabase-db")
          if [ -z "$DB_CID" ]; then
            DB_CID=$(docker ps -q --filter "name=supabase_db")
          fi
          if [ -z "$DB_CID" ]; then
            echo "Could not find Supabase DB container"; exit 1
          fi

          # Determine Postgres major version running in the container (15 or 16)
          PG_MAJOR=$(docker exec "$DB_CID" psql -U postgres -tAc "show server_version_num" | awk '{print int($1/10000) }')
          echo "Detected Postgres major version: $PG_MAJOR"

          # Install pgTAP server package inside the container
          docker exec -u root "$DB_CID" bash -lc "apt-get update && apt-get install -y gnupg wget ca-certificates"
          docker exec -u root "$DB_CID" bash -lc 'echo "deb http://apt.postgresql.org/pub/repos/apt bookworm-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          docker exec -u root "$DB_CID" bash -lc "wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor > /usr/share/keyrings/postgresql.gpg"
          docker exec -u root "$DB_CID" bash -lc 'echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt bookworm-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          docker exec -u root "$DB_CID" bash -lc "apt-get update && apt-get install -y postgresql-${PG_MAJOR}-pgtap || (echo 'pgTAP server pkg not found for PG '${PG_MAJOR} && exit 1)"

      # ---------- Enable extension programmatically (idempotent) ----------
      - name: Enable pgTAP extension (idempotent)
        run: |
          psql -v ON_ERROR_STOP=1 -c "DO $$
          BEGIN
            IF EXISTS (SELECT 1 FROM pg_available_extensions WHERE name='pgtap') THEN
              EXECUTE 'CREATE EXTENSION IF NOT EXISTS pgtap';
            ELSE
              RAISE EXCEPTION 'pgTAP not installed on server';
            END IF;
          END$$;"

      # ---------- Run your pgTAP test files ----------
      - name: Run pgTAP tests
        run: |
          # verbose for TAP output; adjust the glob to your layout
          pg_prove --verbose supabase/tests/pgtap/*.sql

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
