# .github/workflows/clone-to-staging.yml
name: Clone Production → Staging

# ADR-0010's amendment folded migrations into deploy-prod.yml's manual dispatch and
# deleted migrate-db.yml, so "push to master" no longer correlates with a production
# migration at all. Triggering on push (as this workflow used to) let staging's schema
# run ahead of prod for however long a release cycle lasted, then receive a prod data
# restore into that mismatched schema. Trigger on deploy-prod.yml completing instead —
# that's the actual release signal, and it guarantees prod's migration succeeded before
# staging pushes the same migrations and clones prod's (now-consistent) data.
on:
  workflow_run:
    workflows: ['Deploy Production']
    types: [completed]
  workflow_dispatch: {} # manual re-clone without waiting for a release

concurrency:
  group: supabase-staging-clone
  cancel-in-progress: false

env:
  SUPABASE_CLI_VERSION: 2.107.0
  PG_VERSION: 17

permissions:
  contents: read

jobs:
  clone:
    # Skip entirely if deploy-prod ran but failed (or was cancelled) — cloning after a
    # failed release would push a migration prod never actually applied. A manual
    # dispatch has no workflow_run context, so it always proceeds.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    steps:
      # Clone the exact commit that was deployed, not whatever HEAD happens to be when
      # this job starts.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install pg client ${{ env.PG_VERSION }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wget ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor | sudo tee /usr/share/keyrings/pgdg.gpg >/dev/null
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client-${{ env.PG_VERSION }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      # deploy-prod.yml's `migrate` job already applied these to prod before this
      # workflow was triggered (or, on a manual dispatch, prod is already wherever it
      # is) — this just brings staging's schema to the same state. Idempotent no-op if
      # staging is already current.
      - name: Push migrations to staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
        run: supabase db push --db-url "$SUPABASE_STAGING_DB_URL" --yes

      - name: Dump public schema data from production
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          /usr/lib/postgresql/${{ env.PG_VERSION }}/bin/pg_dump "$SUPABASE_DB_URL" \
            --schema=public \
            --data-only \
            --disable-triggers \
            --no-acl \
            --no-owner \
            --format=custom \
            --file=/tmp/prod_data.dump
          echo "Dump size: $(du -sh /tmp/prod_data.dump | cut -f1)"

      # public.users.id is a foreign key to auth.users(id), but this workflow only
      # clones the public schema. Staging's auth.users is a standalone set of test
      # accounts seeded independently of prod, so any prod user id missing from it
      # breaks the public.users restore below (issue: staging clone failure after a
      # new prod signup). Mirror missing ids as inert placeholder rows — unconfirmed,
      # no password, no real email — so the FK is satisfiable without carrying any
      # prod PII into staging. Existing staging auth.users rows are left untouched.
      - name: Sync missing auth.users placeholders to staging
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
        run: |
          PSQL=/usr/lib/postgresql/${{ env.PG_VERSION }}/bin/psql
          "$PSQL" "$SUPABASE_DB_URL" -Atc "select id from auth.users" > /tmp/prod_auth_ids.txt
          echo "Prod auth.users ids: $(wc -l < /tmp/prod_auth_ids.txt)"

          "$PSQL" "$SUPABASE_STAGING_DB_URL" -v ON_ERROR_STOP=1 <<'EOSQL'
          begin;
          create temporary table _prod_auth_ids (id uuid);
          \copy _prod_auth_ids from '/tmp/prod_auth_ids.txt'

          insert into auth.users (
            instance_id, id, aud, role, email, raw_app_meta_data, raw_user_meta_data,
            created_at, updated_at, confirmation_token, recovery_token,
            email_change_token_new, email_change, phone_change, phone_change_token,
            reauthentication_token, email_change_token_current
          )
          select
            '00000000-0000-0000-0000-000000000000', id, 'authenticated', 'authenticated',
            id::text || '@placeholder.local',
            '{"provider":"email","providers":["email"]}'::jsonb, '{}'::jsonb,
            now(), now(), '', '', '', '', '', '', '', ''
          from _prod_auth_ids
          on conflict (id) do nothing;
          commit;
          EOSQL

      - name: Clear staging public schema data
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
        run: |
          /usr/lib/postgresql/${{ env.PG_VERSION }}/bin/psql "$SUPABASE_STAGING_DB_URL" << 'EOSQL'
          DO $$
          DECLARE r record;
          BEGIN
            FOR r IN
              SELECT tablename FROM pg_tables WHERE schemaname = 'public'
            LOOP
              EXECUTE 'TRUNCATE public.' || quote_ident(r.tablename) || ' RESTART IDENTITY CASCADE';
            END LOOP;
          END $$;
          EOSQL

      - name: Restore production data to staging
        env:
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          PGOPTIONS: '--session-replication-role=replica'
        run: |
          /usr/lib/postgresql/${{ env.PG_VERSION }}/bin/pg_restore \
            --dbname="$SUPABASE_STAGING_DB_URL" \
            --data-only \
            --no-acl \
            --no-owner \
            --single-transaction \
            /tmp/prod_data.dump
          echo "Staging clone complete."
