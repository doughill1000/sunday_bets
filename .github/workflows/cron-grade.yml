# .github/workflows/cron-grade.yml
name: 'Cron: Grade Picks'

on:
  schedule:
    # Sun 04:00 UTC (~Sat 11pm ET) — late-season Saturday finals
    - cron: '0 4 * * 0'
    # Hourly Sun 21:00–Mon 06:00 UTC — Sunday early + late slate, SNF
    - cron: '0 21-23 * * 0'
    - cron: '0 0-6 * * 1'
    # Fri 05:00 UTC (~1am ET) — Thursday Night Football finals
    - cron: '0 5 * * 5'
    # Tue 05:00 UTC (~1am ET) — MNF finals, settled overnight (before the weekly-recap push)
    - cron: '0 5 * * 2'
    # Tue 09:00 UTC — MNF backstop (OT / ESPN reporting lag)
    - cron: '0 9 * * 2'
  workflow_dispatch:

concurrency:
  group: cron-grade
  cancel-in-progress: false # let an in-flight grade finish; the next tick queues

jobs:
  grade:
    uses: ./.github/workflows/_cron-call.yml
    with:
      endpoint: grade
      monitor_slug: grade
    secrets: inherit
