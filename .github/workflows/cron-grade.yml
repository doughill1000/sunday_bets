# .github/workflows/cron-grade.yml
name: 'Cron: Grade Picks'

on:
  schedule:
    # Hourly Sun 21:00–Mon 06:00 UTC
    - cron: '0 21-23 * * 0'
    - cron: '0 0-6 * * 1'
    # Tue 09:00 UTC catch-all
    - cron: '0 9 * * 2'
  workflow_dispatch:

jobs:
  grade:
    uses: ./.github/workflows/_cron-call.yml
    with:
      endpoint: grade
      monitor_slug: grade
    secrets: inherit
