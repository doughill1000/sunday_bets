name: CI - Integration (with-auth)

on:
  pull_request:
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'tests/integration/**'
      - '.github/workflows/ci-integration.yml'
  push:
    branches: [master]
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'tests/integration/**'

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: "2.40.7"

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Supabase CLI
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/supabase
          key: supabase-cli-${{ env.SUPABASE_CLI_VERSION }}

      - name: Install Supabase CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sL https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_linux_amd64.tar.gz \
          | tar -xz -C ~/.local/bin supabase
          ~/.local/bin/supabase --version
      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Exclude everything except Kong + GoTrue + PostgREST + DB
      - name: Start local Supabase (auth-capable)
        run: |
          supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
          supabase status -o env >> "$GITHUB_ENV"
          supabase db reset --local

      # Keep the standard 54321 gateway so supabase-js can find /auth/v1 and /rest/v1
      - name: Export app test env
        run: |
          {
            echo "API_URL=${API_URL}"
            echo "ANON_KEY=${ANON_KEY}"
            echo "ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "DB_URL=${DB_URL}"
          } >> "$GITHUB_ENV"
      
      - name: Run integration tests
        env:
          API_URL: ${{ env.API_URL }}
          SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
        run: pnpm test:integration  
      - name: Stop Supabase
        if: always()
        run: supabase stop || true
