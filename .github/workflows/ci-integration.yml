name: CI - Integration (with-auth)

on:
  pull_request:
    branches: [develop]
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'tests/integration/**'
      - '.github/workflows/ci-integration.yml'

jobs:
  integration:
    runs-on: ubuntu-latest
    environment:
      name: Development
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: 2.53.6
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase (auth-capable)
        run: |
          # Exclude unneeded services for faster startup (adjust as needed)
            supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
          # Fresh schema & seed
          supabase db reset --local

      - name: Run integration (Playwright / Vitest, etc.)
        run: pnpm test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
