name: CI - Integration (with-auth)

on:
  pull_request:
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'tests/integration/**'
      - '.github/workflows/ci-integration.yml'
  push:
    branches: [master]
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'tests/integration/**'

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: "2.40.7"

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Supabase CLI
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/supabase
          key: supabase-cli-${{ env.SUPABASE_CLI_VERSION }}

      - name: Install Supabase CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sL https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_linux_amd64.tar.gz \
          | tar -xz -C ~/.local/bin supabase
          ~/.local/bin/supabase --version
      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start Supabase (Docker)
        run: |
          # exclude services we don't need to speed things up
          supabase start -x studio,imgproxy,vector,logflare,edge-runtime

      # (Optional) Wait for HTTP health. The CLI usually waits, but this adds a small buffer.
      - name: Wait for APIs
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:54321/rest/v1/ >/dev/null; then
              echo "PostgREST is up"; break
            fi
            echo "Waiting for Supabase services... ($i/30)"
            sleep 2
          done

      # Apply migrations and seed your test DB.
      # Works with standard Supabase project structure: supabase/migrations, supabase/seed.sql
      - name: Reset DB (migrations + seed)
        run: |
          # Reset applies migrations and seed against the local stack
          supabase db reset

      # Keep the standard 54321 gateway so supabase-js can find /auth/v1 and /rest/v1
      - name: Export app test env
        run: |
          {
            echo "API_URL=http://127.0.0.1:54321"
            echo "ANON_KEY=${ANON_KEY}"
            echo "ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "DB_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          } >> "$GITHUB_ENV"
      
      - name: Run integration tests
        env:
          DB_URL: ${{ env.DB_URL }}
          SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
        run: pnpm test:integration  
      - name: Stop Supabase
        if: always()
        run: supabase stop || true
