name: CI - Integration (with-auth)

on:
  pull_request:
    branches: [master]
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'tests/integration/**'
      - '.github/workflows/ci-integration.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: 2.107.0
      # Integration tests run against the LOCAL Supabase stack started below.
      # These are the Supabase CLI's static local-dev keys — public constants,
      # identical on every machine (also committed in .env.test), NOT secrets.
      PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      # The odds-api-raw-response-retention integration test (#382) exercises
      # fetchNFLSpreadsForWeek for real (fetch itself is mocked), so $env/static/public's
      # PUBLIC_ODDS_API_BASE must resolve to a real URL at build time or the request
      # fails with "Invalid URL". Same throwaway values as ci-tests.yml/playwright.yml.
      PUBLIC_ODDS_API_BASE: https://api.the-odds-api.com/v4
      ODDS_API_KEY1: integration-placeholder
      ODDS_API_KEY2: integration-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Match the Node 22 used by every other CI workflow (ci-tests, playwright,
          # migrate-*). A version skew between integration and unit runs can hide
          # Node-version-specific bugs.
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase (auth-capable)
        run: |
          # Exclude unneeded services for faster startup (adjust as needed)
            supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
          # Fresh schema & seed
          supabase db reset --local

      - name: Run integration (Playwright / Vitest, etc.)
        run: pnpm test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
