# .github/workflows/ci-integration.yml
name: CI - Integration

on:
  pull_request:
  push:
    branches: [master]

jobs:
  integration:
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install deps
        run: pnpm install --frozen-lockfile
      
      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
          | sudo tar -xz -C /usr/local/bin supabase
          supabase --version
      
      - name: Start local Supabase
        run: |
          supabase start -x studio,imgproxy,logflare,vector,realtime,storage
          supabase status -o env >> "$GITHUB_ENV"
      
      - name: Apply migrations + seed
        run: supabase db reset --force
      
      - name: Export app test env
        run: |
          {
            echo "SUPABASE_URL=http://localhost:54321"
            echo "PUBLIC_SUPABASE_URL=http://localhost:54321"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
            echo "DATABASE_URL=${SUPABASE_DB_URL}"
          } >> "$GITHUB_ENV"
      
      - name: Run integration tests
        run: pnpm test:integration
      
      - name: Stop Supabase
        if: always()
        run: supabase stop
