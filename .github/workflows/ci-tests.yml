# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Docs-only PRs (ADRs, README, CHANGELOG, etc.) don't need unit tests or a full
  # build. `code` is true if ANY changed file falls outside docs/** and *.md, so new
  # code directories are covered without needing to enumerate them here.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # `svelte-check` (via `pnpm run check`) types the `$env/static/{public,private}`
      # virtual modules from the environment present at `svelte-kit sync`. CI has no
      # .env files, so define the imported vars here. These are throwaway placeholders
      # for type generation only — no real secrets, no network access.
      PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      PUBLIC_SUPABASE_ANON_KEY: lint-placeholder
      PUBLIC_ODDS_API_BASE: https://api.the-odds-api.com/v4
      SUPABASE_SERVICE_ROLE: lint-placeholder
      CRON_SECRET: lint-placeholder
      ODDS_API_KEY1: lint-placeholder
      ODDS_API_KEY2: lint-placeholder
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec svelte-kit sync
      - run: pnpm run lint
      - run: pnpm run check

  unit:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec svelte-kit sync
      - run: pnpm run test:unit

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      PUBLIC_SUPABASE_ANON_KEY: build-placeholder
      PUBLIC_ODDS_API_BASE: https://api.the-odds-api.com/v4
      SUPABASE_SERVICE_ROLE: build-placeholder
      CRON_SECRET: build-placeholder
      ODDS_API_KEY1: build-placeholder
      ODDS_API_KEY2: build-placeholder
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec svelte-kit sync
      - run: pnpm run build

  # Wrapper jobs so the required-status-check names ("unit-result"/"build-result")
  # still report even when the underlying job is skipped — mirrors pgTap-result /
  # verify-result / dry-run-result rather than relying on GitHub treating a skipped
  # job as a passing required check.
  unit-result:
    needs: unit
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          result="${{ needs.unit.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi

  build-result:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          result="${{ needs.build.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
