name: "Cron: Sync Schedule"

on:
  schedule:
    # Weekly on Tuesday ~15:00 UTC — catches the flex window after Monday's announcement
    - cron: "0 15 * * 2"
  workflow_dispatch:

jobs:
  sync_schedule_production:
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v6
      - name: Call sync-schedule endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ vars.DEPLOY_URL }}/api/cron/sync-schedule")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cron job failed with HTTP $http_code"
            exit 1
          fi
