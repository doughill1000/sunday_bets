# .github/workflows/cron-sync-schedule.yml
name: 'Cron: Sync Schedule'

on:
  schedule:
    # Weekly on Tuesday ~15:00 UTC — catches the flex window after Monday's announcement
    - cron: '0 15 * * 2'
  workflow_dispatch:

jobs:
  sync_schedule:
    uses: ./.github/workflows/_cron-call.yml
    with:
      endpoint: sync-schedule
      monitor_slug: sync-schedule
    secrets: inherit
