# .github/workflows/cron-reset-odds-usage.yml
name: 'Cron: Reset Odds API Usage'

on:
  schedule:
    # Monthly reset — 1st of each month at 00:05 UTC
    - cron: '5 0 1 * *'
  workflow_dispatch:

jobs:
  reset_odds_usage:
    uses: ./.github/workflows/_cron-call.yml
    with:
      endpoint: reset-odds-usage
      monitor_slug: reset-odds-usage
    secrets: inherit
