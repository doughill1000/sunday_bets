# .github/workflows/cron-reset-odds-usage.yml
name: "Cron: Reset Odds API Usage"

on:
  schedule:
    # Monthly reset — 1st of each month at 00:05 UTC
    - cron: "5 0 1 * *"
  workflow_dispatch:

jobs:
  reset_odds_usage_production:
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v6
      - name: Call reset-odds-usage endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.DEPLOY_URL }}/api/cron/reset-odds-usage")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cron job failed with HTTP $http_code"
            exit 1
          fi

  reset_odds_usage_develop:
    runs-on: ubuntu-latest
    environment:
      name: Development
    steps:
      - uses: actions/checkout@v6
      - name: Call reset-odds-usage endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.DEPLOY_URL }}/api/cron/reset-odds-usage")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cron job failed with HTTP $http_code"
            exit 1
          fi
