# .github/workflows/cron-rollover-week.yml
name: 'Cron: Rollover Week'

on:
  schedule:
    # Tue 10:00 UTC — after grade's Tue 09:00 catch-all
    - cron: '0 10 * * 2'
  workflow_dispatch:

jobs:
  rollover_week:
    uses: ./.github/workflows/_cron-call.yml
    with:
      endpoint: rollover-week
      monitor_slug: rollover-week
    secrets: inherit
