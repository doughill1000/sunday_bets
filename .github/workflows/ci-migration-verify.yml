name: CI - Migration Drift (src reproduces migrations)

# Verifies that applying supabase/src/** FROM EMPTY reproduces the schema the committed
# migration chain (= production) produces — the integrity check `pnpm db:migration:check`
# (ledger hashes only) cannot see. See supabase/scripts/verify-src-reproduces-migrations.ts
# and ADR-0011/ADR-0012.
#
# REQUIRED GATE. The ADR-0012 history squash landed (the from-empty baseline now applies:
# the RLS helper functions it depends on are emitted in the schemas phase, ahead of the
# inline policies that call them), so this job blocks the PR on any src↔migration drift.
# Add "verify-result" to the branch's required status checks in GitHub branch protection
# to enforce it on merge.

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            supabase:
              - 'supabase/**'
              - '.github/workflows/ci-migration-verify.yml'

  verify:
    needs: detect-changes
    if: needs.detect-changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      SUPABASE_CLI_VERSION: 2.107.0
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase
        run: supabase start -x realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Verify src reproduces migrations
        run: pnpm db:migration:verify

      - name: Stop Supabase
        if: always()
        run: supabase stop || true

  verify-result:
    needs: verify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          result="${{ needs.verify.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
