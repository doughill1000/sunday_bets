# .github/workflows/cron-sync-odds.yml
name: "Cron: Sync Odds"

on:
  schedule:
    # Daily Tue–Sat ~14:00 UTC
    - cron: "0 14 * * 2-6"
  workflow_dispatch:

jobs:
  sync_odds:
    uses: ./.github/workflows/_cron-call.yml
    with:
      endpoint: sync-odds
      monitor_slug: sync-odds
    secrets: inherit
