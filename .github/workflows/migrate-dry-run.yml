# .github/workflows/migrate-dry-run.yml
name: Supabase Dry Run Migrations

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            supabase:
              - 'supabase/**'
              - '.github/workflows/migrate-dry-run.yml'

  source-integrity:
    needs: detect-changes
    if: needs.detect-changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migration:check

  supabase-dry-run:
    needs: [source-integrity]
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    env:
      SUPABASE_CLI_VERSION: 2.107.0
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Dry run migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Dry running migrations against Production..."
          supabase db push --db-url "$SUPABASE_DB_URL" --dry-run --yes

  dry-run-result:
    needs: [source-integrity, supabase-dry-run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          si="${{ needs.source-integrity.result }}"
          sdr="${{ needs.supabase-dry-run.result }}"
          if [[ ("$si" == "success" || "$si" == "skipped") && ("$sdr" == "success" || "$sdr" == "skipped") ]]; then
            exit 0
          else
            exit 1
          fi
