# .github/workflows/migrate-dry-run.yml
name: Supabase Dry Run Migrations

on:
  pull_request:
    branches: [master]
    paths:
      - 'supabase/**'
      - '.github/workflows/migrate-dry-run.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migration:check

  supabase-dry-run:
    needs: [source-integrity]
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Production
    env:
      SUPABASE_CLI_VERSION: 2.107.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Dry run migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Dry running migrations against Production..."
          supabase db push --db-url "$SUPABASE_DB_URL" --dry-run --yes
