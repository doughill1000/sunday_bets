# .github/workflows/supabase-dry-run.yml
name: Supabase Migrations (dry run)

on:
  pull_request:
    branches: [ master, develop ]

jobs:
  supabase-dry-run:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref == 'master' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
          | sudo tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Dry run migrations
        env:
          # The secret is automatically selected from the job's environment
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Dry running migrations against ${{ job.environment }} environment..."
          supabase db push --db-url "$SUPABASE_DB_URL" --workdir ./app --dry-run --yes
