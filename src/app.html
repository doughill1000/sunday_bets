<!doctype html>
<!-- class + data-theme-mode are filled per request by hooks.server.ts
     (transformPageChunk) from the user's theme_pref: dark/light resolved server-side,
     'system' left as class="dark" for the blocking script below to narrow. Defaults to
     dark for unauthenticated/unset visitors, so first paint is never wrong (#532). -->
<html lang="en" class="%hotshot.themeclass%" data-theme-mode="%hotshot.thememode%">
  <head>
    <meta charset="utf-8" />
    <title>HOTSHOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- theme-color tracks the resolved theme (--background); synced by the script below. -->
    <meta name="theme-color" content="#1c1c1c" />
    <script>
      // Resolve the theme before first paint so there is no flash of the wrong theme.
      // dark/light are already on <html class> from the server; only 'system' needs the
      // client media query here. Then sync theme-color to whatever resolved.
      (function () {
        try {
          var el = document.documentElement;
          if (el.getAttribute('data-theme-mode') === 'system') {
            el.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
          }
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute('content', el.classList.contains('dark') ? '#1c1c1c' : '#f2e7d1');
        } catch (e) {
          /* keep the server-rendered class */
        }
      })();
    </script>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Installed-app launch (iOS): drive a clean standalone launch. iOS ignores the
         manifest's display/name, so these mirror it — full-screen chrome, a black status
         bar matching the app's dark surface, and the home-screen title. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Hotshot" />
    <!-- iOS ignores the manifest splash configuration. These generated portrait
         launch images cover the current iPhone viewport/DPR families. -->
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-640x1136.png"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1242x2208.png"
      media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1125x2436.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-828x1792.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1242x2688.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1206x2622.png"
      media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1284x2778.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1260x2736.png"
      media="(device-width: 420px) and (device-height: 912px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/apple-splash-1320x2868.png"
      media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <!-- Favicons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="tap">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
